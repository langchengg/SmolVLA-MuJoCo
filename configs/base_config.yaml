# =============================================================================
# SmolVLA-MuJoCo Base Configuration
# =============================================================================

project:
  name: "smolvla-mujoco"
  version: "0.1.0"
  seed: 42
  device: "cuda"        # "cuda" for GPU, "cpu" for CPU, "mps" for Apple Silicon
  output_dir: "./results"
  log_level: "INFO"

# Model Configuration
model:
  name: "HuggingFaceTB/SmolVLA-base"
  backbone: "smolvla"
  action_dim: 7          # 6-DoF + gripper
  observation_space:
    image_size: [224, 224]
    use_wrist_camera: true
    use_workspace_camera: true
  action_space:
    type: "continuous"
    dim: 7
    chunk_size: 1         # Default: single-step prediction

# Environment Configuration
environment:
  type: "libero"          # "libero", "metaworld", "custom_mujoco"
  task_suite: "libero_object"  # "libero_spatial", "libero_object", "libero_goal", "libero_100"
  render_mode: "rgb_array"
  image_size: [224, 224]
  max_episode_steps: 300
  camera_names:
    - "agentview"
    - "robot0_eye_in_hand"

# Dataset Configuration
dataset:
  repo_id: "lerobot/libero_object_no_noops"
  split: "train"
  batch_size: 32
  num_workers: 4
  prefetch_factor: 2
  shuffle: true

# WandB Logging
wandb:
  enabled: true
  project: "smolvla-mujoco"
  entity: null
  tags: ["smolvla", "mujoco", "libero", "vla"]
