showcase:
  name: desktop-sorting-showcase
  title: Language-Driven Desktop Grasping and Multi-Object Sorting
  simulator: mujoco
  robot: panda
  workspace: tabletop_two_trays
  scene_version: v1

task_family:
  families:
    - single_object_pick_place
    - color_grouping
    - shape_grouping
    - compositional_sorting
    - paraphrase_generalization
  objects:
    - red_cube
    - blue_cube
    - green_cylinder
    - yellow_block
    - orange_cylinder
  receptacles:
    - left_tray
    - right_tray
    - back_bin
  object_count:
    train: 4
    eval: 5

prompt_templates:
  - "Pick up the red cube and place it in the left tray."
  - "Sort all blue objects into the right tray."
  - "Place cylinders in the back bin and cubes in the front tray."
  - "Move the warm-colored objects to the left tray."
  - "Grasp the crimson block and drop it into the left tray."

cameras:
  primary: front_camera
  views:
    - front_camera
    - wrist_camera
    - top_camera

randomization:
  object_pose: true
  object_texture: true
  lighting: true
  background_texture: true
  camera_yaw_deg:
    - 0
    - 10
    - 20

metrics:
  - task_success_rate
  - object_sort_accuracy
  - instruction_grounding_accuracy
  - completion_time_s
  - collision_count
  - regrasp_count
  - trajectory_jerk

logging:
  episode_log_format: jsonl
  aggregate_log_format: csv
  episode_log_example: examples/desktop_sorting_eval_log.jsonl
  aggregate_log_example: examples/desktop_sorting_eval_summary.csv

video_plan:
  overlay_prompt: true
  compare_zero_shot_vs_finetuned: true
  compare_nominal_vs_perturbed: true
  export_mp4: true
