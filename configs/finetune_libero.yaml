# =============================================================================
# SmolVLA Fine-tuning Configuration (LIBERO)
# =============================================================================

# Inherits from base_config.yaml

training:
  # Training Hyperparameters
  num_epochs: 50
  max_steps: 20000       # ~4h on A100, ~8h on Kaggle T4
  batch_size: 16
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  lr_scheduler: "cosine"
  max_grad_norm: 1.0

  # LoRA Configuration (Parameter-Efficient Fine-Tuning)
  use_lora: true
  lora:
    rank: 16
    alpha: 32
    dropout: 0.1
    target_modules:
      - "q_proj"
      - "v_proj"
      - "k_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"

  # Data Augmentation
  augmentation:
    color_jitter: true
    random_crop: true
    random_erasing: false
    language_augmentation: true

  # Checkpointing
  save_strategy: "steps"
  save_steps: 2000
  save_total_limit: 3
  eval_steps: 1000
  eval_strategy: "steps"

  # Mixed Precision
  fp16: false
  bf16: true            # Preferred on A100/H100

  # Multi-task Training
  multi_task:
    enabled: true
    task_sampling: "uniform"    # "uniform", "proportional", "temperature"
    temperature: 2.0            # Only used if task_sampling="temperature"

# Dataset Override for Fine-tuning
dataset:
  repo_id: "lerobot/libero_object_no_noops"
  train_split: "train[:90%]"
  val_split: "train[90%:]"
  batch_size: 16
  num_workers: 4

# Logging
logging:
  log_every_n_steps: 50
  wandb:
    enabled: true
    project: "smolvla-finetune"
    run_name: "libero-object-lora-r16"
